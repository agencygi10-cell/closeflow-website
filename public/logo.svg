<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="cf-grad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#6b21a8"/>
      <stop offset="45%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <filter id="cf-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="128" height="128" rx="28" fill="#0a0014"/>
  <rect x="2" y="2" width="124" height="124" rx="26" fill="none" stroke="url(#cf-grad)" stroke-width="1.5" opacity="0.55"/>
  <g filter="url(#cf-glow)">
    <!-- "C" arc -->
    <path d="M88 38 A30 30 0 1 0 88 90"
          fill="none" stroke="url(#cf-grad)" stroke-width="9" stroke-linecap="round"/>
    <!-- Flow arrow / point -->
    <path d="M58 64 L78 64 L70 56 M78 64 L70 72"
          fill="none" stroke="url(#cf-grad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Dot -->
    <circle cx="40" cy="64" r="4" fill="#ec4899"/>
  </g>
</svg>
